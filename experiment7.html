<!DOCTYPE html>
<html>

<head>
    <title>Registration Form</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 20px;
            background: #f5f5f5;
        }


        .wrapper {
            width: 420px;
            padding: 30px;
            background: white;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
            font-size: 24px;
        }

        label {
            color: #333;
            font-size: 14px;
            font-weight: 500;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 4px;
            border: 1px solid #ddd;
            background: white;
            transition: 0.2s;
            font-family: inherit;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
        }


        .inline {
            width: auto;
            margin-right: 6px;
            margin-top: 10px;
        }

        /* Button */
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            background: #4CAF50;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #45a049;
        }


        .error-border {
            border: 2px solid #f44336 !important;
        }

        .error-bg {
            background: #ffebee !important;
        }

        #output {

            margin-top: 20px;

            padding: 15px;

            border-radius: 10px;

            background: rgba(255, 255, 255, 0.8);

            color: #333;

            animation: fadeIn 0.5s ease;
        }

        .submitted-data-container {
            margin-top: 40px;
            width: 900px;
            padding: 30px;
            background: white;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .submitted-data-badge {
            display: inline-block;
            background: #4CAF50;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            width: 100%;
            font-size: 14px;
        }

        .submitted-data-title {
            text-align: center;
            color: #333;
            font-size: 20px;
            margin-bottom: 15px;
            font-weight: 700;
            text-decoration: underline;
            text-underline-offset: 6px;
        }

        .table-controls {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .table-controls button {
            padding: 8px 16px;
            font-size: 14px;
            width: auto;
            background: #d3d3d3;
            border: none;
            color: #333;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }

        .table-controls button:hover {
            background: #bfbfbf;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 4px;
            overflow: hidden;
        }

        .data-table thead {
            background: #4CAF50;
            color: white;
        }

        .data-table th {
            padding: 12px;
            text-align: left;
            font-weight: bold;
            border: 1px solid #ddd;
        }

        .data-table td {
            padding: 12px;
            border: 1px solid #ddd;
            color: #333;
        }

        .data-table tbody tr:nth-child(even) {
            background: #f9f9f9;
        }

        .data-table tbody tr:hover {
            background: #f0f0f0;
        }

        .no-data {
            text-align: center;
            color: #999;
            font-style: italic;
            padding: 30px;
        }

        .copy-success {
            background: #2196F3 !important;
        }
    </style>

</head>

<body>

    <div class="wrapper">
        <h2>Registration Form</h2>
        <div id="formContainer"></div>
    </div>

    <div class="wrapper submitted-data-container">
        <div class="submitted-data-title">Submitted Data</div>
        <div class="table-controls">
            <button type="button" id="copyBtn" onclick="copyTableToClipboard()">📋 Copy Table</button>
            <button type="button" id="exportBtn" onclick="exportTableToCSV()">📥 Export CSV</button>
        </div>
        <div id="tableContainer"></div>
    </div>

    <script>
        // Global array to store submissions
        let submissions = [];

        const formContainer = document.getElementById("formContainer");

        formContainer.innerHTML = `
        <form id="myForm">

            <label>Name</label>
            <input type="text" id="name" required>

            <label>Email</label>
            <input type="text" id="email" required>

            <label>USN</label>
            <input type="text" id="usn" required>

            <label>Gender</label><br>
            <input type="radio" name="gender" value="Male" class="inline"> Male
            <input type="radio" name="gender" value="Female" class="inline"> Female
            <br><br>

            <label>Languages</label><br>
            <input type="checkbox" value="HTML" class="skill inline"> HTML
            <input type="checkbox" value="CSS" class="skill inline"> CSS
            <input type="checkbox" value="JavaScript" class="skill inline"> JavaScript
            <input type="checkbox" value="Python" class="skill inline"> Python
            <br><br>

            <label>Date of Birth</label>
            <input type="date" id="dob" required>

            <label>Description</label>
            <textarea id="description" placeholder="Tell us about yourself...."></textarea>

            <button type="submit">Submit</button>

        </form>
    `;

        const form = document.getElementById("myForm");
        const email = document.getElementById("email");

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            if (!email.value.includes("@") || !email.value.includes(".")) {
                email.value = "";
                email.classList.add("error-bg", "error-border");
                email.placeholder = "Enter valid email";
                return;
            }

            const name = document.getElementById("name").value;
            const usn = document.getElementById("usn").value;
            const gender = document.querySelector('input[name="gender"]:checked')?.value || "";
            const dob = document.getElementById("dob").value;
            const description = document.getElementById("description").value;

            const languages = [];
            document.querySelectorAll(".skill:checked").forEach(s => languages.push(s.value));

            // Add submission to array
            const submission = {
                name: name,
                email: email.value,
                usn: usn,
                gender: gender,
                languages: languages.join(", "),
                dob: dob,
                description: description
            };

            submissions.push(submission);

            // Render table
            renderTable();

            // Reset form
            form.reset();
            email.classList.remove("error-bg", "error-border");
        });

        email.addEventListener("input", () => {
            email.classList.remove("error-bg", "error-border");
        });

        // Function to render the table
        function renderTable() {
            const tableContainer = document.getElementById("tableContainer");

            if (submissions.length === 0) {
                tableContainer.innerHTML = '<div class="no-data">No submissions yet.</div>';
                return;
            }

            let tableHTML = `
            <table class="data-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>USN</th>
                        <th>Gender</th>
                        <th>Languages</th>
                        <th>Date of Birth</th>
                        <th>Description</th>
                    </tr>
                </thead>
                <tbody>
            `;

            submissions.forEach((submission, index) => {
                tableHTML += `
                <tr>
                    <td>${index + 1}</td>
                    <td>${submission.name}</td>
                    <td>${submission.email}</td>
                    <td>${submission.usn}</td>
                    <td>${submission.gender}</td>
                    <td>${submission.languages}</td>
                    <td>${submission.dob}</td>
                    <td>${submission.description}</td>
                </tr>
                `;
            });

            tableHTML += `
                </tbody>
            </table>
            `;

            tableContainer.innerHTML = tableHTML;
        }

        // Function to copy table to clipboard
        function copyTableToClipboard() {
            const table = document.querySelector('.data-table');
            
            if (!table) {
                alert('No data to copy');
                return;
            }

            let tableText = "";
            const rows = table.querySelectorAll('tr');
            rows.forEach(row => {
                const cells = row.querySelectorAll('th, td');
                cells.forEach(cell => {
                    tableText += cell.textContent + '\t';
                });
                tableText += '\n';
            });

            navigator.clipboard.writeText(tableText).then(() => {
                const copyBtn = document.getElementById('copyBtn');
                copyBtn.classList.add('copy-success');
                copyBtn.textContent = '✓ Copied!';
                setTimeout(() => {
                    copyBtn.classList.remove('copy-success');
                    copyBtn.textContent = '📋 Copy Table';
                }, 2000);
            });
        }

        // Function to export table to CSV
        function exportTableToCSV() {
            const table = document.querySelector('.data-table');
            
            if (!table) {
                alert('No data to export');
                return;
            }

            let csv = [];
            const rows = table.querySelectorAll('tr');
            rows.forEach(row => {
                const cells = row.querySelectorAll('th, td');
                let rowData = [];
                cells.forEach(cell => {
                    rowData.push('"' + cell.textContent.replace(/"/g, '""') + '"');
                });
                csv.push(rowData.join(','));
            });

            const csvContent = csv.join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'student_data.csv';
            a.click();
            window.URL.revokeObjectURL(url);
        }

        // Initial render
        renderTable();
    </script>

</body>

</html>
