<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <title>Prateek | Portfolio</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            text-decoration: none;
        }

        html {
            font-size: 62.5%;
            scroll-behavior: smooth;
        }

        body {
            background: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
        }

        header {
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            padding: 2rem 9%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo {
            font-size: 2.8rem;
            font-weight: 700;
            color: #ff4c60;
            transition: 0.3s;
        }

        .logo:hover {
            transform: scale(1.1);
        }

        nav a {
            font-size: 1.6rem;
            color: #ddd;
            margin-left: 3rem;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ff4c60;
        }

        section {
            min-height: 100vh;
            padding: 12rem 9% 5rem;
        }

        .home {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8rem;
            flex-wrap: wrap;
        }

        .home-img img {
            width: 30vw;
            border-radius: 50%;
            border: 4px solid #ff4c60;
            box-shadow: 0 0 25px #ff4c60;
            transition: 0.3s;
        }

        .home-img img:hover {
            transform: scale(1.05);
        }

        .home-content h1 {
            font-size: 5.5rem;
        }

        .home-content h1 span {
            color: #ff4c60;
        }

        .home-content h3 {
            font-size: 3rem;
            margin: 1rem 0;
        }

        .home-content p {
            font-size: 1.6rem;
            max-width: 600px;
            line-height: 1.8;
            color: #bbb;
        }

        .typing-text span::before {
            content: "Student";
            color: #ff4c60;
            animation: words 6s infinite;
        }

        @keyframes words {

            0%,
            100% {
                content: "Student";
            }

            50% {
                content: "Web Developer";
            }
        }

        .social-icons {
            margin-top: 2rem;
        }

        .social-icons a {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 4rem;
            height: 4rem;
            margin-right: 1.5rem;
            border-radius: 50%;
            border: 2px solid #ff4c60;
            color: #ff4c60;
            font-size: 1.8rem;
            transition: 0.3s;
        }

        .social-icons a:hover {
            background: #ff4c60;
            color: #000;
            transform: translateY(-5px);
            box-shadow: 0 0 20px #ff4c60;
        }

        .btn {
            display: inline-block;
            margin-top: 3rem;
            padding: 1rem 3rem;
            border-radius: 30px;
            border: 2px solid #ff4c60;
            color: #ff4c60;
            font-size: 1.6rem;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ff4c60;
            color: #000;
            box-shadow: 0 0 20px #ff4c60;
        }

        @media(max-width: 995px) {
            .home {
                flex-direction: column;
                text-align: center;
            }

            .home-img img {
                width: 60vw;
                margin-bottom: 3rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <a href="#" class="logo">Prateek</a>

        <nav>
            <a href="#">Home</a>
            <a href="#">Skills</a>
            <a href="#">Projects</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <section class="home">
        <div class="home-img">
            <img src="contents/prateek.jpeg" alt="Prateek Karna">
        </div>

        <div class="home-content">
            <h1>Hi, I'm <span>Prateek</span></h1>
            <h3>I'm a <span class="typing-text"><span></span></span></h3>

            <p>
                I am a student and aspiring full-stack developer skilled in HTML, CSS, and PostgreSQL.
                Currently learning JavaScript and Data Structures & Algorithms to build efficient,
                scalable web applications.
            </p>

            <div class="social-icons">
                <a href="https://www.instagram.com/prateek_036/" target="_blank">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="https://www.facebook.com/prateekkarna.16" target="_blank">
                    <i class="fab fa-facebook"></i>
                </a>
                <a href="https://www.linkedin.com/in/prateek-karna-99312435b/" target="_blank">
                    <i class="fab fa-linkedin"></i>
                </a>
                <a href="https://github.com/prateekkarna03-coder" target="_blank">
                    <i class="fab fa-github"></i>
                </a>
            </div>

            <a href="#" class="btn">Hire Me</a>
        </div>
    </section>

</body>

</html>
